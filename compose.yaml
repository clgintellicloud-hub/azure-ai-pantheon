# Local Docker Compose for development
# - Uses mock agents by default (for quick local testing)
# - To use REAL deployed Hermes/OpenClaw, override the *_ENDPOINT in .env
#   to point to your ACA instances (see .env.example)
#
# Run with: docker compose up --build
#
# SECURITY: Never put real credentials in this file.
# Use .env (gitignored) with variable substitution or external secrets.

services:
  maf-orchestrator:
    build: ./src/maf-orchestrator
    ports:
      - "8000:8000"
    environment:
      - COSMOS_ENDPOINT=${COSMOS_ENDPOINT:-}
      - COSMOS_KEY=${COSMOS_KEY:-}
      - COSMOS_DATABASE=${COSMOS_DATABASE:-pantheon}
      - COSMOS_CONTAINER=${COSMOS_CONTAINER:-workflow_state}
      - USE_COSMOS_STATE=${USE_COSMOS_STATE:-true}
      - FOUNDRY_ENDPOINT=${FOUNDRY_ENDPOINT:-}
      - HERMES_ENDPOINT=http://hermes-agent:8080
      - OPENCLAW_ENDPOINT=http://openclaw-agent:8080
    volumes:
      - ./src/maf-orchestrator:/app  # Hot reload for development
    depends_on:
      - hermes-agent
      - openclaw-agent

  hermes-agent:
    build: ./agents/hermes-agent
    ports:
      - "8081:8080"
    environment:
      - AGENT_NAME=hermes
      - AGENT_RUNTIME_COMMAND=${HERMES_AGENT_RUNTIME_COMMAND:-}
      - AGENT_RUNTIME_TIMEOUT_SECONDS=${AGENT_RUNTIME_TIMEOUT_SECONDS:-60}

  openclaw-agent:
    build: ./agents/openclaw-agent
    ports:
      - "8082:8080"
    environment:
      - AGENT_NAME=openclaw
      - AGENT_RUNTIME_COMMAND=${OPENCLAW_AGENT_RUNTIME_COMMAND:-}
      - AGENT_RUNTIME_TIMEOUT_SECONDS=${AGENT_RUNTIME_TIMEOUT_SECONDS:-60}
