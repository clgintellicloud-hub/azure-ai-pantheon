name: Deploy Infrastructure (Bicep)

# Security: Follow guidelines in docs/security-guidelines.md
# - Uses OIDC (no long-lived secrets)
# - Minimal permissions
# - Secrets only from GitHub (via vars for non-secrets)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
  push:
    paths:
      - 'infra/**'
    branches: [ main ]

permissions:
  id-token: write   # Required for OIDC / Workload Identity Federation
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Pin actions to specific commits for supply chain security (update SHAs periodically)
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Azure Login (OIDC - no secrets stored in repo)
        # Store values in GitHub Variables (not Secrets) for client-id, tenant, subscription
        uses: azure/login@14a755a4e2d7e2b02b31e8a1c6d8e1d7f9f8e0a1 # v2 (example pinned SHA - replace with actual)
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        run: |
          az deployment sub create \
            --location eastus \
            --template-file infra/main.bicep \
            --parameters environment=${{ github.event.inputs.environment || 'dev' }}
        # Note: Never interpolate untrusted input into sensitive commands without validation.
